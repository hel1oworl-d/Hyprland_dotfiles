# --- Шрифты ---
# Используем Nerd Font для отображения иконок, если ставили JetBrains Mono ранее
# font_family      JetBrainsMono Nerd Font
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
font_size        11.0

# --- Прозрачность и Размытие ---
# Прозрачность фона (0.0 — полностью прозрачный, 1.0 — плотный)
background_opacity 1.00
# Включаем размытие фона для Wayland (Hyprland подхватит автоматически)
background_blur 1

# --- Отступы и внешний вид ---
# Внутренние отступы, чтобы текст не прилипал к границам окна
window_padding_width 12

# Скрывать заголовок окна (в тайлинге Hyprland рамки сверху не нужны)
hide_window_decorations yes

# Форма курсора (beam — вертикальная черта, block — квадрат)
cursor_shape beam
cursor_blink_interval 0.5

# --- Настройки звука ---
# Выключаем раздражающий системный писк при ошибках
enable_audio_bell no


# BEGIN_KITTY_THEME
# Aquarium Dark
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMonoNL Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
